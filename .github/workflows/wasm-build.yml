name: WASM build

on:
  push:
    #  every branch: tests must run after each commit pushed
    paths:
      - 'library/**'
      - 'integration/WebAssembly/**'
      - '.github/workflows/wasm-build.yml'
  pull_request:
    paths:
      - 'library/**'
      - 'integration/WebAssembly/**'
      - '.github/workflows/wasm-build.yml'
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: emscripten/emsdk:3.1.61
    steps:
      - uses: actions/checkout@v4

      - name: Configure (emcmake)
        run: |
          emcmake cmake -S library -B build-wasm \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DUAPKI_LIBS_TYPE=STATIC \
            -DUAPKI_CM_PKCS12_LIB_TYPE=STATIC \
            -DUAPKI_DISABLE_COPY=ON

      - name: Build
        run: cmake --build build-wasm -j"$(nproc)"

      - name: Verify artifacts
        run: |
          ls -la build-wasm/wasm/uapki.mjs build-wasm/wasm/uapki.wasm
          # the loader must be an ES module exporting the factory by default
          grep -q "export default createUapkiModule" build-wasm/wasm/uapki.mjs

      - name: Smoke test (Node.js)
        run: node integration/WebAssembly/test-node.mjs build-wasm/wasm/uapki.mjs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uapki-wasm
          path: |
            build-wasm/wasm/uapki.mjs
            build-wasm/wasm/uapki.wasm
          if-no-files-found: error

  #  When a release is published (the maintainer's usual manual flow), build
  #  the WASM module from the tagged sources and attach it as a release asset
  #  next to the hand-built platform archives. Releases stay immutable and
  #  human-initiated; dev builds are available as workflow artifacts instead.
  release-asset:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: uapki-wasm
          path: module

      - name: Attach WASM asset to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event.release.tag_name }}"
          #  asset naming follows the repo's release convention:
          #  uapki-v<ver>-<platform>.<ext> (see v2.0.12 and earlier releases)
          zipname="uapki-$tag-wasm.zip"
          #  the archive mirrors integration/WebAssembly: the built module goes
          #  into sdk/ (where the SDK imports it from), so serving the archive
          #  over HTTP and opening console.html works out of the box.
          #  LICENSE: BSD requires reproducing the notice in binary distributions
          mkdir -p dist/sdk
          cp module/uapki.mjs module/uapki.wasm dist/sdk/
          cp integration/WebAssembly/sdk/index.mjs integration/WebAssembly/sdk/index.d.ts \
             integration/WebAssembly/sdk/package.json integration/WebAssembly/sdk/README.md dist/sdk/
          cp integration/WebAssembly/console.html integration/WebAssembly/README.md \
             integration/WebAssembly/INTEGRATION.md LICENSE dist/
          (cd dist && zip -qr "../$zipname" .)
          echo "release: $tag, asset: $zipname ($(stat -c%s "$zipname") bytes)"
          gh release upload "$tag" "$zipname" --repo "$GITHUB_REPOSITORY" --clobber
